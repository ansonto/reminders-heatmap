<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders Heatmap</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 2rem; max-width: 960px; margin: 0 auto; }
@media (prefers-color-scheme: dark) { body { background: #111; color: #f0f0f0; } }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

#config { background: #f7f5f0; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
@media (prefers-color-scheme: dark) { #config { background: #1e1e1e; } }
#config h2 { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
.config-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.config-row label { font-size: 12px; color: #888; }
.config-row input { font-size: 13px; padding: 7px 10px; border-radius: 6px; border: 0.5px solid #d0cec8; background: #fff; color: #1a1a1a; width: 100%; font-family: monospace; }
@media (prefers-color-scheme: dark) { .config-row input { background: #2a2a2a; border-color: #444; color: #f0f0f0; } }
.btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#load-btn { font-size: 13px; padding: 8px 20px; border-radius: 6px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; font-weight: 500; }
@media (prefers-color-scheme: dark) { #load-btn { background: #f0f0f0; color: #111; } }
#load-btn:hover { opacity: 0.85; }
#clear-btn { font-size: 12px; padding: 8px 14px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #888; cursor: pointer; }
#clear-btn:hover { color: #e24b4a; border-color: #e24b4a; }
#status { font-size: 12px; color: #888; margin-top: 8px; min-height: 18px; }
.save-note { font-size: 11px; color: #aaa; margin-top: 6px; }

.stats { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.stat-card { background: #f7f5f0; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 90px; }
@media (prefers-color-scheme: dark) { .stat-card { background: #1e1e1e; } }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; }

.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #666; cursor: pointer; }
@media (prefers-color-scheme: dark) { .filter-btn { border-color: #444; color: #aaa; } }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
@media (prefers-color-scheme: dark) { .filter-btn.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; } }
#year-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #666; cursor: pointer; }
@media (prefers-color-scheme: dark) { #year-btn { border-color: #444; color: #aaa; } }
#year-btn:hover { color: #1a1a1a; border-color: #888; }
@media (prefers-color-scheme: dark) { #year-btn:hover { color: #f0f0f0; } }

.month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
.month-title { font-size: 15px; font-weight: 500; min-width: 160px; text-align: center; }
.nav-btn { font-size: 14px; padding: 3px 12px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #666; cursor: pointer; }
@media (prefers-color-scheme: dark) { .nav-btn { border-color: #444; color: #aaa; } }
.nav-btn:hover { border-color: #888; color: #1a1a1a; }
@media (prefers-color-scheme: dark) { .nav-btn:hover { color: #f0f0f0; } }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

.cal-center { display: flex; justify-content: center; }
.cal-inner { display: inline-block; }
.dow-row { display: grid; grid-template-columns: repeat(7, 32px); gap: 4px; margin-bottom: 4px; }
.dow-cell { font-size: 10px; color: #aaa; text-align: center; width: 32px; }
.weeks-grid { display: flex; flex-direction: column; gap: 4px; }
.week-row { display: grid; grid-template-columns: repeat(7, 32px); gap: 4px; }
.day-cell { width: 32px; height: 32px; border-radius: 5px; cursor: pointer; border: 0.5px solid transparent; transition: opacity 0.1s; }
.day-cell:hover { opacity: 0.75; }
.day-cell.other-month { background: transparent !important; cursor: default; border-color: transparent !important; }
.day-cell.today-cell { border: 1.5px solid #1D9E75 !important; }
.day-cell.no-data { background: #f1efed; border-color: #e8e5e0; }
@media (prefers-color-scheme: dark) { .day-cell.no-data { background: #1e1e1e; border-color: #2a2a2a; } }

.legend { display: flex; align-items: center; gap: 5px; margin-top: 12px; justify-content: center; font-size: 11px; color: #aaa; }
.legend-cells { display: flex; gap: 3px; }
.lcell { width: 13px; height: 13px; border-radius: 2px; }

.year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.mini-month-title { font-size: 11px; font-weight: 500; color: #888; margin-bottom: 5px; cursor: pointer; }
.mini-month-title:hover { color: #1a1a1a; text-decoration: underline; }
@media (prefers-color-scheme: dark) { .mini-month-title:hover { color: #f0f0f0; } }
.mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mini-cell { aspect-ratio: 1; border-radius: 2px; cursor: pointer; }

#day-panel { display: none; margin-top: 1.5rem; background: #fff; border: 0.5px solid #e0ddd6; border-radius: 10px; padding: 1rem 1.25rem; }
@media (prefers-color-scheme: dark) { #day-panel { background: #1e1e1e; border-color: #333; } }
.panel-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.panel-title { font-size: 14px; font-weight: 500; }
.close-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #888; }
.task-item { font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid #f0ede6; display: flex; align-items: center; gap: 8px; }
@media (prefers-color-scheme: dark) { .task-item { border-color: #2a2a2a; } }
.task-item:last-child { border-bottom: none; }
.check { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #1D9E75; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.check-inner { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; }
.list-tag { font-size: 11px; color: #888; display: flex; align-items: center; gap: 3px; margin-left: auto; }
.ldot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#placeholder { text-align: center; padding: 3rem 0; color: #aaa; }
#placeholder p { font-size: 14px; }
</style>
</head>
<body>

<h1>Reminders heatmap</h1>
<p class="subtitle" id="subtitle">Completed tasks</p>

<div id="config">
  <h2>Configuration</h2>
  <div class="config-row">
    <label>Notion Integration Token</label>
    <input type="password" id="token" placeholder="ntn_xxxxxxxxxxxxxxxx" />
  </div>
  <div class="config-row">
    <label>Notion Database ID</label>
    <input type="text" id="db-id" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
  </div>
  <div class="btn-row">
    <button id="load-btn" onclick="loadData()">Load data</button>
    <button id="clear-btn" onclick="clearSaved()">Forget credentials</button>
  </div>
  <p id="status"></p>
  <p class="save-note">Credentials are saved in this browser only. Click "Forget credentials" to remove them.</p>
</div>

<div id="main" style="display:none;">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">This month</div><div class="stat-value" id="stat-month">—</div></div>
    <div class="stat-card"><div class="stat-label">Best day</div><div class="stat-value" id="stat-best">—</div></div>
    <div class="stat-card"><div class="stat-label">Active days</div><div class="stat-value" id="stat-active">—</div></div>
    <div class="stat-card"><div class="stat-label">All time</div><div class="stat-value" id="stat-total">—</div></div>
  </div>

  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <button id="year-btn" onclick="toggleYearView()">View full year</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prev-btn" onclick="changeMonth(-1)">&#8592;</button>
    <span class="month-title" id="month-title"></span>
    <button class="nav-btn" id="next-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>

  <div id="month-view">
    <div class="cal-center">
      <div class="cal-inner">
        <div class="dow-row">
          <div class="dow-cell">Mon</div><div class="dow-cell">Tue</div><div class="dow-cell">Wed</div>
          <div class="dow-cell">Thu</div><div class="dow-cell">Fri</div><div class="dow-cell">Sat</div><div class="dow-cell">Sun</div>
        </div>
        <div class="weeks-grid" id="cal-grid"></div>
      </div>
    </div>
  </div>

  <div id="year-view" style="display:none;">
    <div class="year-grid" id="year-grid"></div>
  </div>

  <div class="legend">
    <span>Less</span>
    <div class="legend-cells" id="legend"></div>
    <span>More</span>
  </div>

  <div id="day-panel">
    <div class="panel-hdr">
      <span class="panel-title" id="panel-date"></span>
      <button class="close-btn" onclick="document.getElementById('day-panel').style.display='none'">&#x2715;</button>
    </div>
    <div id="panel-tasks"></div>
  </div>
</div>

<div id="placeholder">
  <p>Enter your Notion token and database ID above, then click "Load data".</p>
</div>

<script>
const COLORS_L = ['#f1efed','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
const COLORS_D = ['#1e1e1e','#085041','#0F6E56','#1D9E75','#5DCAA5'];
const LIST_COLORS = ['#378ADD','#1D9E75','#D85A30','#BA7517','#9B59B6','#E84393'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let dayData = {}, allLists = [], activeList = 'all', showYear = false;
const today = new Date(); today.setHours(0,0,0,0);
let viewYear = today.getFullYear(), viewMonth = today.getMonth();

function loadSaved() {
  try {
    const t = localStorage.getItem('rmhm_token');
    const d = localStorage.getItem('rmhm_dbid');
    if (t) document.getElementById('token').value = t;
    if (d) document.getElementById('db-id').value = d;
    if (t && d) setStatus('Credentials loaded. Click Load data.');
  } catch(e) {}
}

function saveCredentials(t, d) {
  try { localStorage.setItem('rmhm_token', t); localStorage.setItem('rmhm_dbid', d); } catch(e) {}
}

function clearSaved() {
  try {
    localStorage.removeItem('rmhm_token'); localStorage.removeItem('rmhm_dbid');
    document.getElementById('token').value = '';
    document.getElementById('db-id').value = '';
    setStatus('Credentials cleared.');
  } catch(e) {}
}

async function loadData() {
  const token = document.getElementById('token').value.trim();
  const dbId  = document.getElementById('db-id').value.trim().replace(/-/g,'');
  if (!token || !dbId) { setStatus('Please enter both your token and database ID.'); return; }
  saveCredentials(token, dbId);
  setStatus('Loading…');
  dayData = {}; allLists = [];
  try {
    let hasMore = true, cursor = null;
    while (hasMore) {
      const res = await fetch('https://misty-art-578a.ansonto520.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, databaseId: dbId, cursor })
      });
      if (!res.ok) { const e = await res.json(); setStatus('Error: '+(e.message||res.status)); return; }
      const data = await res.json();
      hasMore = data.has_more; cursor = data.next_cursor;
      data.results.forEach(page => {
        const props = page.properties;
        const dateTitle = props.Date?.title?.[0]?.plain_text || '';
        if (!dateTitle.match(/^\d{4}-\d{2}-\d{2}$/)) return;
        const rawTasks = props.Tasks?.rich_text?.[0]?.plain_text || '';
        let tasks = [];
        if (rawTasks.trim()) {
          const entries = rawTasks.split(/(?<=\)),/);
          tasks = entries.map(s => s.trim()).filter(Boolean).map(entry => {
            const ps = entry.lastIndexOf('('), pe = entry.lastIndexOf(')');
            if (ps > 0 && pe > ps) return { name: entry.slice(0,ps).trim(), list: entry.slice(ps+1,pe).trim() };
            return { name: entry, list: 'Unknown' };
          });
        }
        dayData[dateTitle] = tasks;
        tasks.forEach(t => { if (t.list && !allLists.includes(t.list)) allLists.push(t.list); });
      });
    }
    setStatus('Loaded '+Object.keys(dayData).length+' days of data.');
    buildUI();
  } catch(e) { setStatus('Fetch error: '+e.message); }
}

function buildUI() {
  document.getElementById('main').style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  buildFilters(); buildLegend(); render();
}

function fd() {
  if (activeList === 'all') return dayData;
  const out = {};
  for (const [k,t] of Object.entries(dayData)) out[k] = t.filter(x => x.list === activeList);
  return out;
}

function getMax(data) { return Math.max(...Object.values(data).map(t=>t.length), 1); }

function cellColor(count, max) {
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const pal = isDark ? COLORS_D : COLORS_L;
  if (count === 0) return null;
  return pal[Math.min(Math.ceil((count/max)*(pal.length-1)), pal.length-1)];
}

function buildFilters() {
  const bar = document.getElementById('filters'); bar.innerHTML = '';
  const make = (label, val, active) => {
    const b = document.createElement('button');
    b.className = 'filter-btn'+(active?' active':'');
    b.dataset.list = val;
    if (val !== 'all') {
      const idx = allLists.indexOf(val);
      b.innerHTML = `<span class="ldot" style="background:${LIST_COLORS[idx%LIST_COLORS.length]};display:inline-block;margin-right:4px;"></span>${label}`;
    } else b.textContent = label;
    return b;
  };
  bar.appendChild(make('All lists','all',true));
  allLists.forEach(l => bar.appendChild(make(l,l,false)));
  bar.addEventListener('click', e => {
    const btn = e.target.closest('button[data-list]');
    if (!btn) return;
    activeList = btn.dataset.list;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b===btn));
    render();
    document.getElementById('day-panel').style.display = 'none';
  });
}

function buildLegend() {
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const pal = isDark ? COLORS_D : COLORS_L;
  const leg = document.getElementById('legend'); leg.innerHTML = '';
  pal.forEach(c => {
    const el = document.createElement('div');
    el.className = 'lcell'; el.style.background = c;
    leg.appendChild(el);
  });
}

function updateStats() {
  const data = fd();
  const allC = Object.values(data).map(t => t.length);
  document.getElementById('stat-total').textContent = allC.reduce((a,b)=>a+b,0);
  const dim = new Date(viewYear, viewMonth+1, 0).getDate();
  const mc = [];
  for (let d = 1; d <= dim; d++) {
    const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    mc.push((data[key]||[]).length);
  }
  document.getElementById('stat-month').textContent = mc.reduce((a,b)=>a+b,0);
  document.getElementById('stat-best').textContent = Math.max(...mc,0);
  document.getElementById('stat-active').textContent = mc.filter(c=>c>0).length;
}

function buildMonthView(year, month) {
  const data = fd();
  const max = getMax(data);
  document.getElementById('month-title').textContent = MONTHS_FULL[month]+' '+year;
  const grid = document.getElementById('cal-grid'); grid.innerHTML = '';

  const firstDay = new Date(year, month, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const dim = new Date(year, month+1, 0).getDate();
  const prevDim = new Date(year, month, 0).getDate();

  const cells = [];
  for (let i = startDow-1; i >= 0; i--) cells.push({ thisMonth: false });
  for (let d = 1; d <= dim; d++) cells.push({ day: d, thisMonth: true, date: new Date(year, month, d) });
  let next = 1;
  while (cells.length % 7 !== 0) cells.push({ thisMonth: false });

  for (let w = 0; w < cells.length/7; w++) {
    const row = document.createElement('div'); row.className = 'week-row';
    for (let d = 0; d < 7; d++) {
      const cell = cells[w*7+d];
      const el = document.createElement('div'); el.className = 'day-cell';
      if (!cell.thisMonth) {
        el.classList.add('other-month');
      } else {
        const key = cell.date.toISOString().slice(0,10);
        const tasks = data[key] || [];
        const isToday = cell.date.getTime() === today.getTime();
        const color = cellColor(tasks.length, max);
        if (color) el.style.background = color;
        else el.classList.add('no-data');
        if (isToday) el.classList.add('today-cell');
        el.addEventListener('click', () => showPanel(key, tasks));
      }
      row.appendChild(el);
    }
    grid.appendChild(row);
  }
}

function buildYearView() {
  const data = fd();
  const max = getMax(data);
  const grid = document.getElementById('year-grid'); grid.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const wrap = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'mini-month-title';
    title.textContent = MONTHS_SHORT[m]+' '+viewYear;
    title.onclick = () => {
      viewMonth = m; showYear = false;
      document.getElementById('year-view').style.display = 'none';
      document.getElementById('month-view').style.display = 'block';
      document.getElementById('year-btn').textContent = 'View full year';
      document.getElementById('prev-btn').disabled = false;
      document.getElementById('next-btn').disabled = false;
      render();
    };
    wrap.appendChild(title);
    const mg = document.createElement('div'); mg.className = 'mini-grid';
    ['M','T','W','T','F','S','S'].forEach(d => {
      const h = document.createElement('div');
      h.style.cssText = 'font-size:8px;color:#aaa;text-align:center;';
      h.textContent = d; mg.appendChild(h);
    });
    const firstDay = new Date(viewYear, m, 1);
    let sd = firstDay.getDay(); sd = sd===0?6:sd-1;
    const dim = new Date(viewYear, m+1, 0).getDate();
    for (let i = 0; i < sd; i++) { const sp = document.createElement('div'); mg.appendChild(sp); }
    for (let d = 1; d <= dim; d++) {
      const key = `${viewYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const tasks = data[key] || [];
      const color = cellColor(tasks.length, max);
      const cell = document.createElement('div');
      cell.className = 'mini-cell';
      cell.style.background = color || (matchMedia('(prefers-color-scheme: dark)').matches ? '#1e1e1e' : '#f1efed');
      cell.addEventListener('click', () => showPanel(key, tasks));
      mg.appendChild(cell);
    }
    wrap.appendChild(mg); grid.appendChild(wrap);
  }
}

function toggleYearView() {
  showYear = !showYear;
  document.getElementById('year-view').style.display = showYear ? 'block' : 'none';
  document.getElementById('month-view').style.display = showYear ? 'none' : 'block';
  document.getElementById('year-btn').textContent = showYear ? 'View by month' : 'View full year';
  document.getElementById('prev-btn').disabled = showYear;
  document.getElementById('next-btn').disabled = showYear;
  if (showYear) buildYearView();
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
  document.getElementById('day-panel').style.display = 'none';
}

function render() {
  updateStats();
  if (showYear) buildYearView(); else buildMonthView(viewYear, viewMonth);
}

function showPanel(key, tasks) {
  document.getElementById('day-panel').style.display = 'block';
  const date = new Date(key+'T12:00:00');
  document.getElementById('panel-date').textContent =
    date.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) +
    ' — '+tasks.length+' completed';
  const container = document.getElementById('panel-tasks');
  if (!tasks.length) { container.innerHTML = '<p style="font-size:13px;color:#888;">No tasks logged.</p>'; return; }
  container.innerHTML = tasks.map(t => {
    const idx = allLists.indexOf(t.list);
    const dot = LIST_COLORS[idx >= 0 ? idx%LIST_COLORS.length : 0];
    return `<div class="task-item"><div class="check"><div class="check-inner"></div></div><span>${t.name||'Untitled'}</span><span class="list-tag"><span class="ldot" style="background:${dot}"></span>${t.list||''}</span></div>`;
  }).join('');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

loadSaved();
</script>
</body>
</html>

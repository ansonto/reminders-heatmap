<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders Heatmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 2rem; max-width: 960px; }
  @media (prefers-color-scheme: dark) { body { background: #111; color: #f0f0f0; } }

  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

  /* CONFIG */
  #config { background: #f7f5f0; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
  @media (prefers-color-scheme: dark) { #config { background: #1e1e1e; } }
  #config h2 { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .config-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .config-row label { font-size: 12px; color: #888; }
  .config-row input { font-size: 13px; padding: 7px 10px; border-radius: 6px; border: 0.5px solid #d0cec8; background: #fff; color: #1a1a1a; width: 100%; font-family: monospace; }
  @media (prefers-color-scheme: dark) { .config-row input { background: #2a2a2a; border-color: #444; color: #f0f0f0; } }
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #load-btn { font-size: 13px; padding: 8px 20px; border-radius: 6px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; font-weight: 500; }
  @media (prefers-color-scheme: dark) { #load-btn { background: #f0f0f0; color: #111; } }
  #load-btn:hover { opacity: 0.85; }
  #clear-btn { font-size: 12px; padding: 8px 14px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #888; cursor: pointer; }
  #clear-btn:hover { color: #e24b4a; border-color: #e24b4a; }
  #status { font-size: 12px; color: #888; margin-top: 8px; min-height: 18px; }
  .save-note { font-size: 11px; color: #aaa; margin-top: 6px; }

  /* STATS */
  .stats { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: #f7f5f0; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 100px; }
  @media (prefers-color-scheme: dark) { .stat-card { background: #1e1e1e; } }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }

  /* FILTERS + VIEW TOGGLE */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #666; cursor: pointer; }
  @media (prefers-color-scheme: dark) { .filter-btn { border-color: #444; color: #aaa; } }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  @media (prefers-color-scheme: dark) { .filter-btn.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; } }
  #view-toggle { font-size: 12px; padding: 4px 12px; border-radius: 6px; border: 0.5px solid #d0cec8; background: transparent; color: #666; cursor: pointer; white-space: nowrap; }
  @media (prefers-color-scheme: dark) { #view-toggle { border-color: #444; color: #aaa; } }
  #view-toggle:hover { border-color: #888; color: #1a1a1a; }
  @media (prefers-color-scheme: dark) { #view-toggle:hover { color: #f0f0f0; } }

  /* GRID — fixed alignment */
  .grid-wrap { overflow-x: auto; padding-bottom: 6px; }
  .grid-outer { display: inline-flex; gap: 0; align-items: flex-start; }
  .day-labels { display: flex; flex-direction: column; margin-right: 4px; padding-top: 18px; }
  .day-label { height: 16px; font-size: 10px; color: #aaa; display: flex; align-items: center; line-height: 1; }
  .grid-right { display: flex; flex-direction: column; }
  .month-row { display: flex; height: 18px; margin-bottom: 2px; }
  .month-spacer { flex-shrink: 0; }
  .month-label-el { font-size: 10px; color: #aaa; white-space: nowrap; overflow: visible; }
  .grid-cols { display: flex; }
  .col { display: flex; flex-direction: column; }
  .cell { width: 13px; height: 13px; margin: 1.5px; border-radius: 2px; cursor: pointer; transition: opacity 0.1s; flex-shrink: 0; }
  .cell:hover { opacity: 0.7; }
  .cell.empty-cell { cursor: default; background: transparent !important; }
  .legend { display: flex; align-items: center; gap: 5px; margin-top: 8px; justify-content: flex-end; font-size: 11px; color: #aaa; }
  .legend-cells { display: flex; gap: 3px; }

  /* PANEL */
  #day-panel { display: none; margin-top: 1.5rem; background: #fff; border: 0.5px solid #e0ddd6; border-radius: 10px; padding: 1rem 1.25rem; }
  @media (prefers-color-scheme: dark) { #day-panel { background: #1e1e1e; border-color: #333; } }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .panel-title { font-size: 14px; font-weight: 500; }
  .close-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #888; padding: 0; }
  .task-item { font-size: 13px; padding: 7px 0; border-bottom: 0.5px solid #f0ede6; display: flex; align-items: center; gap: 8px; }
  @media (prefers-color-scheme: dark) { .task-item { border-color: #2a2a2a; } }
  .task-item:last-child { border-bottom: none; }
  .check { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #1D9E75; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check-inner { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; }
  .list-tag { font-size: 11px; color: #888; display: flex; align-items: center; gap: 3px; margin-left: auto; }
  .list-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .empty-msg { font-size: 13px; color: #888; }

  #placeholder { text-align: center; padding: 3rem 0; color: #aaa; }
  #placeholder p { font-size: 14px; }
</style>
</head>
<body>

<h1>Reminders heatmap</h1>
<p class="subtitle" id="subtitle">Completed tasks</p>

<div id="config">
  <h2>Configuration</h2>
  <div class="config-row">
    <label>Notion Integration Token</label>
    <input type="password" id="token" placeholder="ntn_xxxxxxxxxxxxxxxx" />
  </div>
  <div class="config-row">
    <label>Notion Database ID</label>
    <input type="text" id="db-id" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
  </div>
  <div class="btn-row">
    <button id="load-btn" onclick="loadData()">Load data</button>
    <button id="clear-btn" onclick="clearSaved()">Forget credentials</button>
  </div>
  <p id="status"></p>
  <p class="save-note">Your credentials are saved in this browser only. Click "Forget credentials" to remove them.</p>
</div>

<div id="main" style="display:none;">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total completed</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Best day</div><div class="stat-value" id="stat-best">—</div></div>
    <div class="stat-card"><div class="stat-label">Current streak</div><div class="stat-value" id="stat-streak">—</div></div>
    <div class="stat-card"><div class="stat-label">Active days</div><div class="stat-value" id="stat-active">—</div></div>
  </div>

  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <button id="view-toggle" onclick="toggleView()">View full year</button>
  </div>

  <div class="grid-wrap">
    <div class="grid-outer">
      <div class="day-labels" id="day-labels"></div>
      <div class="grid-right">
        <div class="month-row" id="month-labels"></div>
        <div class="grid-cols" id="grid"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span>Less</span>
    <div class="legend-cells" id="legend"></div>
    <span>More</span>
  </div>

  <div id="day-panel">
    <div class="panel-header">
      <span class="panel-title" id="panel-date"></span>
      <button class="close-btn" onclick="document.getElementById('day-panel').style.display='none'">✕</button>
    </div>
    <div id="panel-tasks"></div>
  </div>
</div>

<div id="placeholder">
  <p>Enter your Notion token and database ID above, then click "Load data".</p>
</div>

<script>
const COLORS_LIGHT = ['#f1efed','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
const COLORS_DARK  = ['#1e1e1e','#085041','#0F6E56','#1D9E75','#5DCAA5'];
const LIST_COLORS  = ['#378ADD','#1D9E75','#D85A30','#BA7517','#9B59B6','#E84393'];
const CELL = 16; // cell width + margins (13px + 1.5px * 2)
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let dayData = {};
let allLists = [];
let activeList = 'all';
let showFullYear = false;

// ── Saved credentials ──────────────────────────────────────
function loadSaved() {
  try {
    const t = localStorage.getItem('rmhm_token');
    const d = localStorage.getItem('rmhm_dbid');
    if (t) document.getElementById('token').value = t;
    if (d) document.getElementById('db-id').value = d;
    if (t && d) setStatus('Credentials loaded from browser. Click Load data.');
  } catch(e) {}
}

function saveCredentials(token, dbId) {
  try {
    localStorage.setItem('rmhm_token', token);
    localStorage.setItem('rmhm_dbid', dbId);
  } catch(e) {}
}

function clearSaved() {
  try {
    localStorage.removeItem('rmhm_token');
    localStorage.removeItem('rmhm_dbid');
    document.getElementById('token').value = '';
    document.getElementById('db-id').value = '';
    setStatus('Credentials cleared.');
  } catch(e) {}
}

// ── Data loading ───────────────────────────────────────────
async function loadData() {
  const token = document.getElementById('token').value.trim();
  const dbId  = document.getElementById('db-id').value.trim().replace(/-/g,'');
  if (!token || !dbId) { setStatus('Please enter both your token and database ID.'); return; }

  saveCredentials(token, dbId);
  setStatus('Loading…');
  dayData = {}; allLists = [];

  try {
    let hasMore = true, cursor = null;
    while (hasMore) {
      const res = await fetch('https://misty-art-578a.ansonto520.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, databaseId: dbId, cursor })
      });
      if (!res.ok) { const e = await res.json(); setStatus('Error: ' + (e.message || res.status)); return; }
      const data = await res.json();
      hasMore = data.has_more;
      cursor  = data.next_cursor;

      data.results.forEach(page => {
        const props = page.properties;
        const dateTitle = props.Date?.title?.[0]?.plain_text || '';
        if (!dateTitle.match(/^\d{4}-\d{2}-\d{2}$/)) return;
        const rawTasks = props.Tasks?.rich_text?.[0]?.plain_text || '';
        let tasks = [];
        if (rawTasks.trim()) {
          const entries = rawTasks.split(/(?<=\)),/);
          tasks = entries.map(s => s.trim()).filter(Boolean).map(entry => {
            const ps = entry.lastIndexOf('(');
            const pe = entry.lastIndexOf(')');
            if (ps > 0 && pe > ps) return { name: entry.slice(0,ps).trim(), list: entry.slice(ps+1,pe).trim() };
            return { name: entry, list: 'Unknown' };
          });
        }
        dayData[dateTitle] = tasks;
        tasks.forEach(t => { if (t.list && !allLists.includes(t.list)) allLists.push(t.list); });
      });
    }
    setStatus('Loaded ' + Object.keys(dayData).length + ' days of data.');
    buildUI();
  } catch(e) { setStatus('Fetch error: ' + e.message); }
}

// ── View toggle ────────────────────────────────────────────
function toggleView() {
  showFullYear = !showFullYear;
  document.getElementById('view-toggle').textContent = showFullYear ? 'View recent months' : 'View full year';
  document.getElementById('subtitle').textContent = showFullYear
    ? 'Completed tasks — last 12 months'
    : 'Completed tasks — last 2 months';
  buildGrid();
  document.getElementById('day-panel').style.display = 'none';
}

// ── UI ─────────────────────────────────────────────────────
function buildUI() {
  document.getElementById('main').style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('subtitle').textContent = 'Completed tasks — last 2 months';
  buildFilters();
  buildGrid();
}

function buildFilters() {
  const bar = document.getElementById('filters');
  bar.innerHTML = '';
  bar.appendChild(makeBtn('All lists', 'all', true));
  allLists.forEach(l => bar.appendChild(makeBtn(l, l, false)));
  bar.addEventListener('click', e => {
    const btn = e.target.closest('button[data-list]');
    if (!btn) return;
    activeList = btn.dataset.list;
    document.querySelectorAll('#filters button').forEach(b => b.classList.toggle('active', b === btn));
    buildGrid();
    document.getElementById('day-panel').style.display = 'none';
  });
}

function makeBtn(label, val, active) {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (active ? ' active' : '');
  b.dataset.list = val;
  if (val !== 'all') {
    const idx = allLists.indexOf(val);
    b.innerHTML = `<span class="list-dot" style="background:${LIST_COLORS[idx%LIST_COLORS.length]};display:inline-block;margin-right:4px;"></span>${label}`;
  } else {
    b.textContent = label;
  }
  return b;
}

function filteredData() {
  if (activeList === 'all') return dayData;
  const out = {};
  for (const [k,tasks] of Object.entries(dayData)) out[k] = tasks.filter(t => t.list === activeList);
  return out;
}

// ── Grid (fixed alignment) ─────────────────────────────────
function buildGrid() {
  const data = filteredData();
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const pal = isDark ? COLORS_DARK : COLORS_LIGHT;

  // Determine end date
  const browserToday = new Date(); browserToday.setHours(0,0,0,0);
  const allKeys = Object.keys(data).sort();
  const latestKey = allKeys[allKeys.length - 1];
  let endDate = new Date(browserToday);
  if (latestKey) {
    const [y,m,d] = latestKey.split('-').map(Number);
    const dd = new Date(y,m-1,d);
    if (dd > endDate) endDate = dd;
  }
  endDate.setDate(endDate.getDate() + 2);

  const daysBack = showFullYear ? 365 : 62;
  const startDate = new Date(endDate); startDate.setDate(startDate.getDate() - daysBack);

  // Stats (always over all data for the chosen window)
  const counts = [];
  for (let i = 0; i <= daysBack; i++) {
    const d = new Date(endDate); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    counts.push((data[k]||[]).length);
  }
  const total = counts.reduce((a,b)=>a+b,0);
  const best  = Math.max(...counts,0);
  let streak = 0;
  for (let i = 0; i < counts.length; i++) { if (counts[i] > 0) streak++; else break; }
  const active = counts.filter(c=>c>0).length;
  const max = Math.max(...counts,1);

  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-best').textContent   = best;
  document.getElementById('stat-streak').textContent = streak + (streak===1?' d':' d');
  document.getElementById('stat-active').textContent = active;

  function cellColor(count) {
    if (count === 0) return pal[0];
    return pal[Math.min(Math.ceil((count/max)*(pal.length-1)), pal.length-1)];
  }

  // Legend
  const leg = document.getElementById('legend'); leg.innerHTML = '';
  pal.forEach(c => {
    const el = document.createElement('div');
    el.style.cssText = `width:13px;height:13px;border-radius:2px;background:${c};`;
    leg.appendChild(el);
  });

  // Build week columns: start on Sunday of the week containing startDate
  const startSunday = new Date(startDate);
  startSunday.setDate(startSunday.getDate() - startSunday.getDay());

  const weeks = [];
  let cur = new Date(startSunday);
  while (cur <= endDate) {
    const week = [];
    for (let d = 0; d < 7; d++) { week.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
    weeks.push(week);
  }

  // Day labels (fixed height rows)
  const dayLab = document.getElementById('day-labels'); dayLab.innerHTML = '';
  ['','M','','W','','F',''].forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = d;
    dayLab.appendChild(el);
  });

  // Month labels — placed by pixel offset of first week of each month
  const monthRow = document.getElementById('month-labels'); monthRow.innerHTML = '';
  let lastMonth = -1;
  const monthPositions = []; // [{month, weekIndex}]
  weeks.forEach((week, wi) => {
    const firstVisible = week.find(d => d >= startDate && d <= endDate);
    if (!firstVisible) return;
    const m = firstVisible.getMonth();
    if (m !== lastMonth) { monthPositions.push({month: m, weekIndex: wi}); lastMonth = m; }
  });

  // Build month label row using absolute offsets
  monthPositions.forEach((mp, i) => {
    const nextWi = i + 1 < monthPositions.length ? monthPositions[i+1].weekIndex : weeks.length;
    const widthWeeks = nextWi - mp.weekIndex;
    const spacer = document.createElement('div');
    spacer.className = 'month-spacer';
    spacer.style.width = (mp.weekIndex * CELL) + 'px';
    const label = document.createElement('div');
    label.className = 'month-label-el';
    label.style.width = (widthWeeks * CELL) + 'px';
    label.textContent = MONTHS[mp.month];
    if (i === 0) {
      // first label: insert spacer then label
      monthRow.appendChild(spacer);
    }
    monthRow.appendChild(label);
  });

  // Simpler month row: just build one flat flex row
  monthRow.innerHTML = '';
  let prevWi = 0;
  monthPositions.forEach((mp, i) => {
    // spacer from prevWi to mp.weekIndex
    const gap = mp.weekIndex - prevWi;
    if (gap > 0) {
      const sp = document.createElement('div');
      sp.style.cssText = `width:${gap*CELL}px;flex-shrink:0;`;
      monthRow.appendChild(sp);
    }
    const lbl = document.createElement('div');
    lbl.style.cssText = `font-size:10px;color:#aaa;white-space:nowrap;flex-shrink:0;`;
    lbl.textContent = MONTHS[mp.month];
    monthRow.appendChild(lbl);
    prevWi = mp.weekIndex + 1;
  });

  // Grid columns
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  weeks.forEach(week => {
    const col = document.createElement('div'); col.className = 'col';
    week.forEach(day => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const inRange = day >= startDate && day <= endDate;
      const key = day.toISOString().slice(0,10);
      const tasks = inRange ? (data[key]||[]) : [];
      if (!inRange) {
        cell.classList.add('empty-cell');
      } else {
        cell.style.background = cellColor(tasks.length);
        cell.title = `${key}: ${tasks.length} completed`;
        cell.addEventListener('click', () => showPanel(key, tasks));
      }
      col.appendChild(cell);
    });
    grid.appendChild(col);
  });
}

function showPanel(key, tasks) {
  document.getElementById('day-panel').style.display = 'block';
  const date = new Date(key + 'T12:00:00');
  document.getElementById('panel-date').textContent =
    date.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) +
    ' — ' + tasks.length + ' completed';
  const container = document.getElementById('panel-tasks');
  if (!tasks.length) { container.innerHTML = '<p class="empty-msg">No tasks logged for this day.</p>'; return; }
  container.innerHTML = tasks.map(t => {
    const idx = allLists.indexOf(t.list);
    const dot = LIST_COLORS[idx >= 0 ? idx % LIST_COLORS.length : 0];
    return `<div class="task-item">
      <div class="check"><div class="check-inner"></div></div>
      <span>${t.name||'Untitled'}</span>
      <span class="list-tag"><span class="list-dot" style="background:${dot}"></span>${t.list||''}</span>
    </div>`;
  }).join('');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// Load saved credentials on page load
loadSaved();
</script>
</body>
</html>
